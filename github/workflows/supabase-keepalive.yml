name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 6 */3 * *'  # runs every 3 days at 6am UTC
  workflow_dispatch:  # lets you trigger it manually too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/auth/v1/health
